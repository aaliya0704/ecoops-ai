name: EcoOps AI Green CI/CD Interceptor Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sustainability-gate:
    name: AI Grid Telemetry Evaluation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Configure Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'

    - name: Install Architecture Dependecies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Execute EcoOps Green Interceptor Gate
      env:
        # Pass configuration endpoints securely into the GitHub Runner environment context
        ECOOPS_CORE_API_URL: ${{ secrets.ECOOPS_CORE_API_URL || 'http://localhost:8000' }}
      run: |
        python ecoops_interceptor.py

  execute-heavy-testing:
    name: Heavy Enterprise Automation Test Suite
    needs: sustainability-gate
    runs-on: ubuntu-latest

    steps:
    - name: Execute Code Compilations and Integration Testing
      run: |
        echo "🚀 Running 4,500 carbon-intensive system integration tests..."
        echo "✅ All tests completed cleanly with zero carbon waste errors!"